networks:
  microshop-net:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  product-data:
  loki-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ordersdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microshop-net
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key}
      AUTH_USER_1: ${AUTH_USER_1:-nurzhan}
      AUTH_PASS_1: ${AUTH_PASS_1:-password123}
      AUTH_USER_2: ${AUTH_USER_2:-admin}
      AUTH_PASS_2: ${AUTH_PASS_2:-admin}
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  product-service:
    build: ./services/product-service
    container_name: product-service
    volumes:
      - product-data:/app/data
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  order-service:
    build: ./services/order-service
    container_name: order-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ordersdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  user-service:
    build: ./services/user-service
    container_name: user-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key}
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  chat-service:
    build: ./services/chat-service
    container_name: chat-service
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key}
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.1

  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - microshop-net
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
