version: '3.8'

networks:
  microshop-net:
    driver: bridge

volumes:
  postgres-data:
  grafana-data:
  product-data:

services:

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ordersdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - microshop-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    ports:
      - "8001:8001"
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key}
      AUTH_USER_1: ${AUTH_USER_1:-nurzhan}
      AUTH_PASS_1: ${AUTH_PASS_1:-password123}
      AUTH_USER_2: ${AUTH_USER_2:-admin}
      AUTH_PASS_2: ${AUTH_PASS_2:-admin}
    networks:
      - microshop-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  product-service:
    build: ./services/product-service
    container_name: product-service
    ports:
      - "8002:8002"
    volumes:
      - product-data:/app/data
    networks:
      - microshop-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8003:8003"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ordersdb
      DB_USER: postgres
      DB_PASS: ${DB_PASS:-postgres}
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  user-service:
    build: ./services/user-service
    container_name: user-service
    ports:
      - "8004:8004"
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  chat-service:
    build: ./services/chat-service
    container_name: chat-service
    ports:
      - "8005:8005"
    environment:
      JWT_SECRET: ${JWT_SECRET:-changeme-super-secret-key}
    networks:
      - microshop-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - microshop-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: '0.1'
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80 > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    networks:
      - microshop-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - microshop-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
