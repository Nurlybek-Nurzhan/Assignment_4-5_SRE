groups:
  - name: microshop_alerts
    rules:

      - alert: OrderServiceErrors
        expr: increase(order_errors_total[1m]) > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Order Service is experiencing errors"
          description: "order_errors_total has increased in the last 1 minute — DB connection likely broken."

      - alert: ServiceDown
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: "Prometheus cannot scrape {{ $labels.job }} — the service may have crashed."

      - alert: OrderServiceHighLatency
        expr: histogram_quantile(0.95, rate(order_request_duration_seconds_bucket[5m])) > 1.0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Order Service p95 latency is above 1 second"
          description: "95th percentile request latency exceeded 1s for 1 minute — possible DB slowness."
